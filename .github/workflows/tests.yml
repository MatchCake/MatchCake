name: Tests

on:
  pull_request:
    branches: [ "*" ]

permissions:
  contents: read

jobs:
  Run-tests-on-Ubuntu:
    name: Run tests on Ubuntu-latest
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", ]

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "0.9.2"
        python-version: ${{ matrix.python-version }}
        enable-cache: true
    - name: Install dependencies
      run: |
        uv venv .venv
        uv sync --locked --dev --extra cpu
    - name: Test Linting
      run: |
        uv run black src tests --check --diff
        uv run isort src tests --check-only --diff
    - name: Test Typing
      continue-on-error: true
      run: |
        uv run mypy src tests
    - name: Test Unittests with pytest
      run: |
        # TODO: add -n=auto when possible
        uv run pytest tests --cov=src --cov-report="xml:tests/.tmp/coverage.xml" --cov-report=term-missing --durations=30 --session-timeout=600
    - name: Test Notebooks
      run: |
        uv run pytest --nbmake tutorials -n=auto --nbmake-kernel=python3 --nbmake-timeout=600  # 10 minutes timeout

    - name: Upload coverage artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage
        path: tests/.tmp/coverage.xml
        if-no-files-found: error
        retention-days: 1
        overwrite: true

    - name: Test Build
      if: ${{ matrix.python-version == '3.10' }}
      run: |
        uv run python -m build --sdist --wheel --no-isolation --outdir dist/ .
        uv run twine check dist/*

  Run-tests-on-Windows:
    name: Run tests on Windows-latest
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13",]

    steps:
    - uses: actions/checkout@v3
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install uv
      uses: astral-sh/setup-uv@v6
      with:
        version: "0.9.2"
        python-version: ${{ matrix.python-version }}
        enable-cache: true
    - name: Install dependencies
      run: |
        uv venv .venv
        uv sync --locked --dev --extra cpu
    - name: Test Unittests with pytest
      run: |
        # TODO: add -n=auto when possible
        uv run pytest tests --session-timeout=600
