repos:
  - repo: local
    hooks:
      - id: uv-lock
        name: uv lock (only when pyproject.toml changes)
        entry: uv lock
        language: system
        pass_filenames: false
        files: ^pyproject\.toml$

      - id: ruff-format
        name: ruff format (changed files only)
        entry: uv run ruff format
        language: system
        types: [python]
        pass_filenames: true

      - id: ruff-check
        name: ruff check (changed files only)
        entry: uv run ruff check --fix
        language: system
        types: [python]
        pass_filenames: true

      - id: mypy
        name: mypy (advisory)
        entry: bash -c 'uv run mypy "$@" || true'
        language: system
        types: [python]
